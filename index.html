<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">AI வாகன விலைக்கணிப்பு - Enterprise Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #b0bec5;
            --accent-blue: #00d2ff;
            --accent-green: #00ff87;
            --accent-orange: #ff9f43;
            --accent-purple: #a55eea;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body { background: var(--bg-gradient); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: var(--text-primary); }

        .lang-container { position: absolute; top: 20px; right: 20px; }
        .lang-select { padding: 8px 14px; background: rgba(255, 255, 255, 0.12); border: 1px solid var(--card-border); color: white; border-radius: 8px; cursor: pointer; font-weight: 600; outline: none; }

        .container { width: 100%; max-width: 620px; background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--card-border); border-radius: 24px; padding: 40px 30px; box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3); }

        .header { text-align: center; margin-bottom: 35px; }
        .header h1 { font-size: 2.2rem; font-weight: 700; background: linear-gradient(to right, var(--accent-blue), var(--accent-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 8px; }
        .form-group input, .form-group select { width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--card-border); border-radius: 12px; color: #fff; font-size: 1rem; }

        .btn-submit { width: 100%; padding: 16px; background: linear-gradient(135deg, #00c6ff, #0072ff); border: none; border-radius: 12px; color: #fff; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
        
        .result-box { display: none; margin-top: 35px; padding-top: 25px; border-top: 1px solid var(--card-border); }
        .price-card { background: rgba(255, 255, 255, 0.04); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .price-value { font-size: 1.8rem; font-weight: 700; color: var(--accent-green); }
        
        .loader-container { display: none; text-align: center; margin-top: 25px; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="lang-container">
        <select id="langSelect" class="lang-select" onchange="toggleLanguage()">
            <option value="ta">🌐 தமிழ்</option>
            <option value="en">🌐 English</option>
        </select>
    </div>

    <div class="container">
        <div class="header">
            <h1 id="lblTitle">AI வாகன விலைக்கணிப்பு</h1>
        </div>

        <div class="form-group">
            <label>வாகனத்தின் பெயர்</label>
            <input type="text" id="vehicle">
        </div>
        <div class="form-group">
            <label>ஓடிய கிலோமீட்டர் (km)</label>
            <input type="number" id="km">
        </div>
        <div class="form-group">
            <label>வாகனத்தின் புகைப்படம்</label>
            <input type="file" id="vehicle_photo" accept="image/*" onchange="previewImage(event)">
            <div id="imagePreviewContainer" style="display: none; margin-top: 15px;">
                <img id="imagePreview" style="max-width: 100%; border-radius: 12px;">
            </div>
        </div>

        <button class="btn-submit" id="btnCalculate" onclick="calculatePrice()">மதிப்பைக் கணக்கிடு 🚀</button>

        <div class="loader-container" id="loader">
            <div class="spinner"></div>
            <p>AI இன்ஜின் அலசுகிறது...</p>
        </div>

        <div class="result-box" id="resultBox">
            <div class="price-card">
                <span class="price-value" id="resEstimatedPrice">₹0</span>
            </div>
        </div>
    </div>

    <script>
        // புகைப்படம் சுருக்கும் பங்க்ஷன் (800px Resizing)
        async function resizeAndCompressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; 
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob((blob) => { resolve(blob); }, 'image/jpeg', 0.8);
                    };
                };
            });
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('imagePreviewContainer').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        async function calculatePrice() {
            const vehicle = document.getElementById('vehicle').value;
            const km = document.getElementById('km').value;
            const photoInput = document.getElementById('vehicle_photo');
            const loader = document.getElementById('loader');
            
            if (!vehicle || !km) { alert("விவரங்களை நிரப்பவும்!"); return; }

            loader.style.display = 'block';
            const formData = new FormData();
            formData.append('vehicle', vehicle);
            formData.append('km', km);

            // புகைப்படம் இருந்தால் சுருக்கி சேர்க்கவும்
            if (photoInput.files.length > 0) {
                const compressedBlob = await resizeAndCompressImage(photoInput.files[0]);
                formData.append('photo', compressedBlob, 'vehicle.jpg');
            }

            try {
                const response = await fetch('/estimate', { method: 'POST', body: formData });
                const data = await response.json();
                loader.style.display = 'none';
                document.getElementById('resultBox').style.display = 'block';
                document.getElementById('resEstimatedPrice').innerText = '₹' + data.estimated_price;
            } catch (err) {
                loader.style.display = 'none';
                alert("பிழை ஏற்பட்டது!");
            }
        }
    </script>
</body>
</html>
