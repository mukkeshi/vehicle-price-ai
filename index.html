<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI வாகன விலைக்கணிப்பு - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #b0bec5;
            --accent-blue: #00d2ff;
            --accent-green: #00ff87;
            --accent-orange: #ff9f43;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-primary);
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 12px rgba(0, 210, 255, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.3);
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #0072ff, #00c6ff);
            box-shadow: 0 8px 25px rgba(0, 114, 255, 0.4);
            transform: scale(1.02);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* Loading Spinner */
        .loader-container {
            display: none;
            text-align: center;
            margin-top: 25px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Result Section */
        .result-box {
            display: none;
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid var(--card-border);
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent-blue);
            margin-bottom: 15px;
            text-align: center;
            text-transform: uppercase;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            margin-bottom: 20px;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 15px;
            border-radius: 8px;
        }

        .price-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .price-card.new { border-left: 5px solid var(--accent-orange); }
        .price-card.resale { border-left: 5px solid var(--accent-green); }

        .price-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .price-value {
            font-size: 1.6rem;
            font-weight: 700;
        }
        
        .price-card.new .price-value { color: var(--accent-orange); }
        .price-card.resale .price-value { color: var(--accent-green); }

        .error-box {
            display: none;
            margin-top: 25px;
            background: rgba(255, 75, 75, 0.1);
            border: 1px solid rgba(255, 75, 75, 0.3);
            border-left: 5px solid #ff4b4b;
            padding: 15px;
            border-radius: 12px;
            color: #ff8a8a;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>AI வாகன விலைக்கணிப்பு</h1>
            <p>உடனடி மற்றும் துல்லியமான சந்தை மதிப்பு அறிக்கை</p>
        </div>

        <div class="form-group">
            <label for="vehicle">வாகனத்தின் பெயர்</label>
            <input type="text" id="vehicle" placeholder="எ.கா: Yamaha R15, Swift, Activa">
        </div>

        <div class="form-group">
            <label for="km">ஓடிய கிலோமீட்டர் (km)</label>
            <input type="number" id="km" placeholder="எ.கா: 15000">
        </div>

        <button class="btn-submit" onclick="calculatePrice()">விலையைக் கணக்கிடு 🚀</button>

        <div class="loader-container" id="loader">
            <div class="spinner"></div>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">AI மதிப்பை பகுப்பாய்வு செய்கிறது...</p>
        </div>

        <div class="error-box" id="errorMsg"></div>

        <div class="result-box" id="resultBox">
            <div class="result-title" id="resVehicleName">YAMAHA</div>
            
            <div class="info-row">
                <span>ஓடிய தூரம்:</span>
                <span id="resKm" style="color: #fff; font-weight: 600;">0 km</span>
            </div>

            <div class="price-card new">
                <span class="price-label">புதிய வாகனத்தின் இன்றைய ஆன்-ரோடு விலை:</span>
                <span class="price-value" id="resNewPrice">₹0</span>
            </div>

            <div class="price-card resale">
                <span class="price-label">தற்போதைய மறுவிற்பனை மதிப்பு (Resale Value):</span>
                <span class="price-value" id="resEstimatedPrice">₹0</span>
            </div>
        </div>
    </div>

    <script>
        async function calculatePrice() {
            const vehicle = document.getElementById('vehicle').value;
            const km = document.getElementById('km').value;
            
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');
            const errorMsg = document.getElementById('errorMsg');

            // Reset UI
            resultBox.style.display = 'none';
            errorMsg.style.display = 'none';

            if (!vehicle || !km) {
                errorMsg.innerText = "தயவுசெய்து அனைத்து விவரங்களையும் நிரப்பவும்!";
                errorMsg.style.display = 'block';
                return;
            }

            // Show Loader
            loader.style.display = 'block';

            try {
                // உங்கள் Render வெப்சைட் URL-ஐ இது தானாகவே எடுத்துக்கொள்ளும்
                const response = await fetch('/estimate', {
                    method: 'POST',
                    headers: { '熱' : 'application/json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ vehicle: vehicle, km: km })
                });

                const data = await response.json();
                loader.style.display = 'none';

                if (data.error) {
                    errorMsg.innerText = data.error;
                    errorMsg.style.display = 'block';
                } else {
                    // Format Numbers to Currency Format (e.g., 1,50,000)
                    const formatCurrency = (num) => {
                        const cleanNum = String(num).replace(/[^0-9]/g, '');
                        return cleanNum ? '₹' + Number(cleanNum).toLocaleString('en-IN') : '₹' + num;
                    };

                    document.getElementById('resVehicleName').innerText = data.vehicle_name;
                    document.getElementById('resKm').innerText = Number(data.kilometers).toLocaleString('en-IN') + ' km';
                    document.getElementById('resNewPrice').innerText = formatCurrency(data.new_price);
                    document.getElementById('resEstimatedPrice').innerText = formatCurrency(data.estimated_price);
                    
                    resultBox.style.display = 'block';
                }
            } catch (error) {
                loader.style.display = 'none';
                errorMsg.innerText = "ஆன்லைனில் கணக்கிடுவதில் பிழை ஏற்பட்டது. மீண்டும் முயற்சிக்கவும்!";
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
