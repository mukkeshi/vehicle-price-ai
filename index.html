<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">AI வாகன விலைக்கணிப்பு - Enterprise Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #b0bec5;
            --accent-blue: #00d2ff;
            --accent-green: #00ff87;
            --accent-orange: #ff9f43;
            --accent-purple: #a55eea;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-primary);
        }

        .container {
            width: 100%;
            max-width: 620px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3);
        }

        /* PDF சுருக்கத்திற்கான புதிய வசதி */
        #reportContent {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            word-wrap: break-word;
        }

        .header { text-align: center; margin-bottom: 35px; }
        .header h1 { font-size: 2.2rem; font-weight: 700; background: linear-gradient(to right, var(--accent-blue), var(--accent-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 8px; }
        .form-group input, .form-group select { width: 100%; padding: 14px 18px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--card-border); border-radius: 12px; color: #fff; }
        
        .btn-submit { width: 100%; padding: 16px; background: linear-gradient(135deg, #00c6ff, #0072ff); border: none; border-radius: 12px; color: #fff; font-weight: 600; cursor: pointer; }

        .result-box { display: none; margin-top: 35px; padding-top: 25px; border-top: 1px solid var(--card-border); }
        .price-card { background: rgba(255, 255, 255, 0.04); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; margin-bottom: 15px; position: relative; }
        
        .price-value { font-size: 1.8rem; font-weight: 700; }
        .meta-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .meta-badge { background: rgba(255, 255, 255, 0.04); padding: 12px; border-radius: 12px; text-align: center; }
        
        .action-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .btn-action { padding: 14px; border: none; border-radius: 12px; color: #fff; font-weight: 600; cursor: pointer; }
        .btn-pdf { background: #e74c3c; }
        .btn-wa { background: #2ecc71; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 id="lblTitle">AI வாகன விலைக்கணிப்பு</h1>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label id="lblVehicle">வாகனத்தின் பெயர்</label>
                <input type="text" id="vehicle" placeholder="எ.கா: Yamaha R15">
            </div>
            <div class="form-group">
                <label id="lblKm">ஓடிய கிலோமீட்டர் (km)</label>
                <input type="number" id="km" placeholder="15000">
            </div>
            <div class="form-group">
                <label id="lblFuel">எரிபொருள் வகை</label>
                <select id="fuel_type">
                    <option value="Petrol">Petrol</option>
                    <option value="Diesel">Diesel</option>
                </select>
            </div>
            <div class="form-group">
                <label id="lblCondition">நிலை (Condition)</label>
                <select id="condition">
                    <option value="Excellent">Excellent</option>
                    <option value="Good">Good</option>
                </select>
            </div>
        </div>

        <button class="btn-submit" id="btnCalculate" onclick="calculatePrice()">மதிப்பைக் கணக்கிடு 🚀</button>

        <div class="result-box" id="resultBox">
            <div id="reportContent" class="pdf-content">
                <div class="result-title" id="resVehicleName" style="text-align: center; margin-bottom: 20px;">VEHICLE</div>
                <div class="meta-container">
                    <div class="meta-badge"><span id="resLblKm">தூரம்</span> <strong id="resKm">0 km</strong></div>
                    <div class="meta-badge"><span id="resLblCond">நிலை</span> <strong id="resCondition">Good</strong></div>
                </div>
                <div class="price-card">
                    <span class="price-label">மறுவிற்பனை மதிப்பு:</span>
                    <span class="price-value" id="resEstimatedPrice">₹0</span>
                </div>
                <div class="advice-card">
                    <p class="advice-text" id="resAdvice">AI அறிக்கை இங்கே...</p>
                </div>
            </div>

            <div class="action-group">
                <button class="btn-action btn-pdf" onclick="downloadPDF()">📄 PDF அறிக்கை</button>
                <button class="btn-action btn-wa" onclick="shareWhatsApp()">💬 வாட்ஸ்அப் பகிர்வு</button>
            </div>
        </div>
    </div>

    <script>
        let reportData = null;

        async function calculatePrice() {
            // உங்கள் தர்க்கம் இங்கே...
            // உதாரணத்திற்கு மட்டும்:
            document.getElementById('resultBox').style.display = 'block';
            reportData = { vehicle_name: "Test Vehicle", kilometers: "1000", condition: "Good", estimated_price: "50000", ai_advice: "நல்ல நிலை" };
        }

        function downloadPDF() {
            const element = document.getElementById('reportContent');
            const opt = {
                margin: 10,
                filename: 'Report.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, width: 800 }, // 800px அகலத்திற்கு சுருக்குகிறது
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
