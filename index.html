<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vehicle Valuation</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: blue; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI Vehicle Valuation</h1>
        <input type="text" id="vehicle" placeholder="Vehicle Name (e.g. Swift)">
        <input type="number" id="km" placeholder="Kilometers Driven">
        <select id="condition">
            <option value="Good">Good</option>
            <option value="Excellent">Excellent</option>
            <option value="Fair">Fair</option>
        </select>
        <button onclick="calculate()">Calculate Value</button>
        <div id="result"></div>
    </div>

    <script>
        async function calculate() {
            const data = {
                vehicle: document.getElementById('vehicle').value,
                km: document.getElementById('km').value,
                condition: document.getElementById('condition').value
            };

            const res = await fetch('/estimate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const json = await res.json();
            document.getElementById('result').innerHTML = `<h3>Estimated Price: ${json.estimated_price}</h3>`;
        }
    </script>
</body>
</html>
