<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">AI வாகன விலைக்கணிப்பு - Enterprise Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #b0bec5;
            --accent-blue: #00d2ff;
            --accent-green: #00ff87;
            --accent-orange: #ff9f43;
            --accent-purple: #a55eea;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-gradient); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: var(--text-primary); position: relative; }
        
        .lang-container { position: absolute; top: 20px; right: 20px; }
        .lang-select { padding: 8px 14px; background: rgba(255, 255, 255, 0.12); border: 1px solid var(--card-border); color: white; border-radius: 8px; cursor: pointer; font-weight: 600; outline: none; }
        .container { width: 100%; max-width: 620px; background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--card-border); border-radius: 24px; padding: 40px 30px; box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3); margin-top: 40px; }
        
        .header { text-align: center; margin-bottom: 35px; }
        .header h1 { font-size: 2.2rem; font-weight: 700; background: linear-gradient(to right, var(--accent-blue), var(--accent-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .header p { font-size: 0.95rem; color: var(--text-secondary); }
        
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 25px; }
        .form-group { margin-bottom: 5px; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); }
        .form-group input, .form-group select { width: 100%; padding: 14px 18px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--card-border); border-radius: 12px; color: #fff; font-size: 1rem; outline: none; }
        
        .btn-submit { width: 100%; padding: 16px; background: linear-gradient(135deg, #00c6ff, #0072ff); border: none; border-radius: 12px; color: #fff; font-size: 1.1rem; font-weight: 600; cursor: pointer; box-shadow: 0 6px 20px rgba(0, 114, 255, 0.3); }
        
        .loader-container { display: none; text-align: center; margin-top: 25px; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255, 255, 255, 0.1); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .result-box { display: none; margin-top: 35px; padding-top: 25px; border-top: 1px solid var(--card-border); }
        .result-title { font-size: 1.5rem; font-weight: 700; color: var(--accent-blue); margin-bottom: 20px; text-align: center; }
        .meta-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .meta-badge { background: rgba(255, 255, 255, 0.04); padding: 12px; border-radius: 12px; text-align: center; font-size: 0.85rem; color: var(--text-secondary); border: 1px solid var(--card-border); }
        .meta-badge strong { display: block; color: #fff; font-size: 1.05rem; margin-top: 3px; }
        
        .price-card { background: rgba(255, 255, 255, 0.04); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; margin-bottom: 15px; position: relative; }
        .price-card.new { border-left: 5px solid var(--accent-orange); }
        .price-card.resale { border-left: 5px solid var(--accent-green); }
        .price-label { font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; }
        .price-value { font-size: 1.8rem; font-weight: 700; display: block; }
        .pct-badge { position: absolute; right: 20px; top: 20px; background: rgba(255, 75, 75, 0.2); color: #ff7675; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
        
        .advice-card { background: rgba(165, 94, 234, 0.08); border-left: 5px solid var(--accent-purple); border-radius: 16px; padding: 20px; margin-bottom: 25px; }
        .advice-title { font-size: 0.95rem; font-weight: 700; color: var(--accent-purple); margin-bottom: 5px; }
        
        .action-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .btn-action { padding: 14px; border: none; border-radius: 12px; font-size: 0.95rem; font-weight: 600; cursor: pointer; color: #fff; }
        .btn-pdf { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .btn-wa { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .error-box { display: none; margin-top: 25px; background: rgba(255, 75, 75, 0.1); border-left: 5px solid #ff4b4b; padding: 15px; border-radius: 12px; color: #ff8a8a; text-align: center; }
    </style>
</head>
<body>

    <div class="lang-container">
        <select id="langSelect" class="lang-select" onchange="toggleLanguage()">
            <option value="ta" selected>🌐 தமிழ்</option>
            <option value="en">🌐 English</option>
        </select>
    </div>

    <div class="container">
        <div class="header">
            <h1 id="lblTitle">AI வாகன விலைக்கணிப்பு</h1>
            <p id="lblSubtitle">Premium Enterprise Pro Edition</p>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label id="lblVehicle" for="vehicle">வாகனத்தின் பெயர்</label>
                <input type="text" id="vehicle" placeholder="எ.கா: Yamaha R15, Swift">
            </div>
            <div class="form-group">
                <label id="lblKm" for="km">ஓடிய கிலோமீட்டர் (km)</label>
                <input type="number" id="km" placeholder="எ.கா: 15000">
            </div>
            <div class="form-group">
                <label id="lblPhoto" for="vehicle_photo">வாகனத்தின் புகைப்படம் (Optional)</label>
                <input type="file" id="vehicle_photo" accept="image/*" onchange="previewImage(event)">
                <div id="imagePreviewContainer" style="display: none; margin-top: 15px; text-align: center;">
                    <img id="imagePreview" src="#" alt="Preview" style="max-width: 100%; max-height: 200px; border-radius: 12px;">
                </div>
            </div>
        </div>

        <button class="btn-submit" id="btnCalculate" onclick="calculatePrice()">மதிப்பைக் கணக்கிடு 🚀</button>

        <div class="loader-container" id="loader">
            <div class="spinner"></div>
            <p id="lblLoaderText">புகைப்படம் சுருக்கப்பட்டு, AI அலசுகிறது...</p>
        </div>

        <div class="error-box" id="errorMsg"></div>
        <div class="result-box" id="resultBox">
            <div id="reportContent">
                <div class="result-title" id="resVehicleName">VEHICLE</div>
                <div class="price-card resale">
                    <span class="price-label" id="resLblResalePrice">தற்போதைய மறுவிற்பனை மதிப்பு:</span>
                    <span class="price-value" id="resEstimatedPrice">₹0</span>
                    <span class="pct-badge" id="resPct">0% Drop</span>
                </div>
                <div class="advice-card">
                    <div class="advice-title" id="resLblAdviceTitle">💡 AI அறிக்கை:</div>
                    <p class="advice-text" id="resAdvice"></p>
                </div>
            </div>
            <div class="action-group">
                <button class="btn-action btn-pdf" onclick="downloadPDF()">📄 PDF</button>
                <button class="btn-action btn-wa" onclick="shareWhatsApp()">💬 WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        // படத்தின் அளவைக் குறைக்கும் புதிய லாஜிக்
        async function resizeImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; 
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                        }, 'image/jpeg', 0.7);
                    };
                };
            });
        }

        async function calculatePrice() {
            const vehicle = document.getElementById('vehicle').value;
            const photoFile = document.getElementById('vehicle_photo').files[0];
            const loader = document.getElementById('loader');
            
            if (!vehicle) { alert("விவரங்களை நிரப்பவும்!"); return; }
            loader.style.display = 'block';

            let finalPhoto = null;
            if (photoFile) {
                // இங்கே புகைப்படம் சுருக்கப்படுகிறது
                finalPhoto = await resizeImage(photoFile);
            }

            const formData = new FormData();
            formData.append('vehicle', vehicle);
            formData.append('km', document.getElementById('km').value);
            // ... பிற append செயல்பாடுகள் ...
            if (finalPhoto) { formData.append('photo', finalPhoto); }

            // fetch அழைப்பு...
            try {
                // உங்கள் பழைய fetch லாஜிக் இங்கே வரும்
                loader.style.display = 'none';
            } catch (error) {
                loader.style.display = 'none';
            }
        }
        
        // பிற ஃபங்க்ஷன்கள் (previewImage, downloadPDF, etc.) அப்படியே இருக்கும்...
    </script>
</body>
</html>
