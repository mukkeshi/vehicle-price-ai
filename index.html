<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">AI வாகன விலைக்கணிப்பு - Enterprise Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364); --card-bg: rgba(255, 255, 255, 0.08); --card-border: rgba(255, 255, 255, 0.15); --text-primary: #ffffff; --text-secondary: #b0bec5; --accent-blue: #00d2ff; --accent-green: #00ff87; --accent-orange: #ff9f43; --accent-purple: #a55eea; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-gradient); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: var(--text-primary); }
        .lang-container { position: absolute; top: 20px; right: 20px; }
        .lang-select { padding: 8px 14px; background: rgba(255, 255, 255, 0.12); border: 1px solid var(--card-border); color: white; border-radius: 8px; cursor: pointer; font-weight: 600; outline: none; }
        .container { width: 100%; max-width: 620px; background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--card-border); border-radius: 24px; padding: 40px 30px; box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3); }
        .header { text-align: center; margin-bottom: 35px; }
        .form-grid { display: grid; gap: 15px; margin-bottom: 25px; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); }
        .form-group input, .form-group select { width: 100%; padding: 14px 18px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--card-border); border-radius: 12px; color: #fff; font-size: 1rem; outline: none; }
        .btn-submit { width: 100%; padding: 16px; background: linear-gradient(135deg, #00c6ff, #0072ff); border: none; border-radius: 12px; color: #fff; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
        .loader-container { display: none; text-align: center; margin-top: 25px; }
        .result-box { display: none; margin-top: 35px; padding-top: 25px; border-top: 1px solid var(--card-border); }
        .price-card { background: rgba(255, 255, 255, 0.04); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .error-box { display: none; margin-top: 25px; background: rgba(255, 75, 75, 0.1); border-left: 5px solid #ff4b4b; padding: 15px; border-radius: 12px; color: #ff8a8a; text-align: center; }
    </style>
</head>
<body>
    <div class="lang-container">
        <select id="langSelect" class="lang-select" onchange="toggleLanguage()">
            <option value="ta" selected>🌐 தமிழ்</option>
            <option value="en">🌐 English</option>
        </select>
    </div>
    <div class="container">
        <div class="header"><h1 id="lblTitle">AI வாகன விலைக்கணிப்பு</h1><p id="lblSubtitle">Premium Enterprise Pro Edition</p></div>
        <div class="form-grid">
            <div class="form-group"><label id="lblVehicle" for="vehicle">வாகனத்தின் பெயர்</label><input type="text" id="vehicle" placeholder="எ.கா: Yamaha R15, Swift"></div>
            <div class="form-group"><label id="lblKm" for="km">ஓடிய கிலோமீட்டர் (km)</label><input type="number" id="km" placeholder="எ.கா: 15000"></div>
            <div class="form-group"><label id="lblFuel" for="fuel_type">எரிபொருள் வகை</label><select id="fuel_type"><option value="Petrol" id="optPetrol">Petrol</option><option value="Diesel" id="optDiesel">Diesel</option><option value="Electric (EV)" id="optEV">Electric</option></select></div>
            <div class="form-group"><label id="lblOwners" for="owners">உரிமையாளர்கள்</label><select id="owners"><option value="1st Owner" id="opt1st">1st Owner</option><option value="2nd Owner" id="opt2nd">2nd Owner</option><option value="3rd Owner+" id="opt3rd">3rd Owner+</option></select></div>
            <div class="form-group"><label id="lblCondition" for="condition">தற்போதைய நிலை</label><select id="condition"><option value="Excellent" id="optExc">Excellent</option><option value="Good" id="optGood">Good</option><option value="Fair" id="optFair">Fair</option></select></div>
            <div class="form-group"><label id="lblPhoto">வாகனத்தின் புகைப்படம் (Optional)</label><input type="file" id="vehicle_photo" accept="image/*" onchange="previewImage(event)">
                <div id="imagePreviewContainer" style="display:none; margin-top:15px;"><img id="imagePreview" style="max-width:100%; max-height:200px; border-radius:12px;"></div>
            </div>
        </div>
        <button class="btn-submit" id="btnCalculate" onclick="calculatePrice()">மதிப்பைக் கணக்கிடு 🚀</button>
        <div class="loader-container" id="loader"><div class="spinner"></div></div>
        <div class="error-box" id="errorMsg"></div>
        <div class="result-box" id="resultBox">
            <div id="reportContent">
                <div id="resVehicleName" style="color:#00d2ff; font-size:1.5rem; font-weight:700; text-align:center;">VEHICLE</div>
                <div class="price-card">
                    <span id="resLblNewPrice">புதிய விலை:</span><br><span id="resNewPrice" style="font-size:1.8rem; font-weight:700;">₹0</span>
                </div>
                <div class="price-card">
                    <span id="resLblResalePrice">மறுவிற்பனை மதிப்பு:</span><br><span id="resEstimatedPrice" style="font-size:1.8rem; font-weight:700; color:#00ff87;">₹0</span>
                </div>
                <div class="price-card" style="border-left:5px solid #a55eea;">
                    <div id="resLblAdviceTitle" style="font-weight:700;">Gemini AI நிபுணர் அறிக்கை:</div>
                    <p id="resAdvice"></p>
                </div>
            </div>
        </div>
    </div>
    <script>
        // முழுமையான லாஜிக் இங்கே வரும் (முந்தைய கோடில் இருந்த அதே லாஜிக்)
        async function calculatePrice() {
            const formData = new FormData();
            formData.append('vehicle', document.getElementById('vehicle').value);
            formData.append('km', document.getElementById('km').value);
            formData.append('lang', document.getElementById('langSelect').value);
            
            document.getElementById('loader').style.display = 'block';
            try {
                const response = await fetch('/estimate', { method: 'POST', body: formData });
                const data = await response.json();
                document.getElementById('loader').style.display = 'none';
                if(data.error) throw new Error(data.error);
                document.getElementById('resVehicleName').innerText = data.vehicle_name;
                document.getElementById('resNewPrice').innerText = '₹' + data.new_price;
                document.getElementById('resEstimatedPrice').innerText = '₹' + data.estimated_price;
                document.getElementById('resAdvice').innerText = data.ai_advice;
                document.getElementById('resultBox').style.display = 'block';
            } catch(e) {
                document.getElementById('errorMsg').innerText = e.message;
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const img = document.getElementById('imagePreview');
                img.src = reader.result;
                document.getElementById('imagePreviewContainer').style.display = 'block';
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
</body>
</html>
